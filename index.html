<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <h1>Expense Tracker</h1>
        <p>Track your daily spending in a simple way</p>
    </header>

    <main class="container">
        <section class="card">
            <h2>Add New Expense</h2>

            <form id="expense-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="e.g. Coffee">
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category">
                        <option value="">Select a category</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" name="amount" placeholder="e.g. 12.50" step="0.01" min="0">
                    </div>

                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date">
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" placeholder="Write a short note..."></textarea>
                </div>

                <button type="submit" class="primary-btn">Add Expense</button>
            </form>
        </section>

        <section class="card">
            <h2>Expense List</h2>
            <ul id="expense-list" class="expense-list">
                <li class="expense-item placeholder-item">
                    No expenses yet.
                </li>
            </ul>
        </section>

        <section class="card">
            <h2>Category Summary</h2>
            <div id="category-summary" class="summary-box">
                <p>Food: $0.00</p>
                <p>Transport: $0.00</p>
                <p>Shopping: $0.00</p>
            </div>

            <h3>Total Spending: <span id="total-spending">$0.00</span></h3>
        </section>

        <section class="card">
            <h2>Monthly Trend</h2>
            <div id="monthly-trend" class="trend-box">
                <p>2026-03: $0.00</p>
                <p>2026-04: $0.00</p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>Built for Internet Programming practice</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
